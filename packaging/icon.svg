<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Seating Chart Manager app icon.
    Chair silhouette on a green gradient circle, macOS-standard
    "squircle" rounded-rect background shape. Sized at 1024×1024
    with safe margins; macOS will resize to every required bucket.
  -->

  <!-- macOS app icons use a specific squircle ("superellipse") shape.
       An SVG rounded rect with r≈180 is a very close approximation. -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d7d4f"/>
      <stop offset="100%" stop-color="#1a5233"/>
    </linearGradient>
    <!-- Subtle shadow under the chair for depth -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="64" y="64" width="896" height="896"
        rx="200" ry="200" fill="url(#bg)"/>

  <!--
    Chair silhouette — centered, faces camera slightly.
    Simple wooden dining-chair style: back, seat, four legs.
    Uses warm cream (#f2e8d5) against the green for contrast.
  -->
  <g filter="url(#soft-shadow)" fill="#f2e8d5">

    <!-- Chair back: tall vertical rect with rounded top corners -->
    <rect x="368" y="240" width="288" height="340"
          rx="24" ry="24"/>

    <!-- Back support slats (two thin horizontal bars) for detail -->
    <rect x="408" y="320" width="208" height="18" rx="6" ry="6"
          fill="#d9cca8"/>
    <rect x="408" y="400" width="208" height="18" rx="6" ry="6"
          fill="#d9cca8"/>

    <!-- Seat: wider horizontal rect below the back -->
    <rect x="312" y="560" width="400" height="76"
          rx="14" ry="14"/>

    <!-- Four legs: thick verticals extending from seat to bottom -->
    <!-- Front-left -->
    <rect x="324" y="620" width="40" height="180" rx="8" ry="8"/>
    <!-- Front-right -->
    <rect x="660" y="620" width="40" height="180" rx="8" ry="8"/>
    <!-- Back-left (slightly inset, simulating perspective) -->
    <rect x="384" y="620" width="32" height="180" rx="7" ry="7"
          fill="#e0d4b8"/>
    <!-- Back-right (slightly inset) -->
    <rect x="608" y="620" width="32" height="180" rx="7" ry="7"
          fill="#e0d4b8"/>

  </g>
</svg>
